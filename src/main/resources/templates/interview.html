<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>模拟面试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .container { max-width: 800px; margin: 30px auto; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .card-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 24px; }
        .btn-gradient { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; }
        .btn-gradient:hover { color: white; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,87,108,0.4); }
        .result-area { background: #f8f9fa; border-radius: 12px; padding: 20px; white-space: pre-wrap; line-height: 1.8; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e9ecef; border-top: 4px solid #f5576c; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto; }
        .score-high { background: #d4edda; color: #155724; }
        .score-medium { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">🎯 模拟面试</h3>
            <p class="mb-0 opacity-75">AI 面试官生成题目，并对你的回答进行评分和反馈</p>
        </div>
        <div class="card-body">
            <!-- 生成题目 -->
            <div id="questionSection">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-semibold">💼 目标岗位</label>
                        <input type="text" id="jobPosition" class="form-control" placeholder="例如：Java开发工程师" value="Java开发工程师">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">📊 难度</label>
                        <select id="difficulty" class="form-select">
                            <option value="easy">初级</option>
                            <option value="medium" selected>中级</option>
                            <option value="hard">高级</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-gradient w-100 py-2" onclick="generateQuestion()">
                    📝 生成面试题
                </button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p class="mt-3 text-muted">AI 正在生成题目...</p>
            </div>

            <!-- 题目展示 -->
            <div id="questionArea" style="display: none;" class="mt-3">
                <div class="alert alert-info">
                    <strong>📌 面试题</strong>
                    <div id="questionContent" class="mt-2 result-area"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">✍️ 你的回答</label>
                    <textarea id="answerInput" class="form-control" rows="6" placeholder="请输入你的回答..."></textarea>
                </div>
                <button class="btn btn-success w-100 py-2" onclick="submitAnswer()">
                    📤 提交回答，获取评分
                </button>
            </div>

            <!-- 结果展示 -->
            <div id="resultArea" style="display: none;" class="mt-3">
                <div class="text-center mb-3">
                    <div id="scoreDisplay" class="score-circle score-medium">0</div>
                    <small class="text-muted">综合评分</small>
                </div>
                <div id="feedbackContent" class="result-area"></div>
                <button class="btn btn-outline-primary mt-3" onclick="resetInterview()">🔄 再来一题</button>
            </div>

            <hr class="mt-4">
            <div class="d-flex gap-2">
                <a href="/interview/history" class="btn btn-outline-secondary btn-sm">📋 历史记录</a>
                <a href="/videos" class="btn btn-outline-primary btn-sm">← 返回首页</a>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        alert('请先登录！');
        location.href = '/login';
    }

    let currentRecordId = null;

    function generateQuestion() {
        const jobPosition = document.getElementById('jobPosition').value.trim();
        const difficulty = document.getElementById('difficulty').value;

        if (!jobPosition) {
            alert('请输入目标岗位！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('questionSection').style.display = 'none';
        document.getElementById('questionArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';

        const formData = new URLSearchParams();
        formData.append('jobPosition', jobPosition);
        formData.append('difficulty', difficulty);

        fetch('/interview/api/generate', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (data.code === 200) {
                    currentRecordId = data.data.id;
                    document.getElementById('questionContent').innerHTML = formatMarkdown(data.data.question);
                    document.getElementById('questionArea').style.display = 'block';
                    document.getElementById('answerInput').value = '';
                } else {
                    alert('生成失败：' + data.message);
                    document.getElementById('questionSection').style.display = 'block';
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('questionSection').style.display = 'block';
                alert('网络错误，请稍后重试');
                console.error(err);
            });
    }

    function submitAnswer() {
        const answer = document.getElementById('answerInput').value.trim();
        if (!answer) {
            alert('请输入你的回答！');
            return;
        }
        if (!currentRecordId) {
            alert('请先生成面试题！');
            return;
        }

        const formData = new URLSearchParams();
        formData.append('recordId', currentRecordId);
        formData.append('answer', answer);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('questionArea').style.display = 'none';

        fetch('/interview/api/submit', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (data.code === 200) {
                    const record = data.data;
                    document.getElementById('scoreDisplay').textContent = record.score;
                    document.getElementById('scoreDisplay').className = 'score-circle ' +
                        (record.score >= 80 ? 'score-high' : record.score >= 60 ? 'score-medium' : 'score-low');
                    document.getElementById('feedbackContent').innerHTML = formatMarkdown(record.aiFeedback);
                    document.getElementById('resultArea').style.display = 'block';
                } else {
                    alert('提交失败：' + data.message);
                    document.getElementById('questionArea').style.display = 'block';
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('questionArea').style.display = 'block';
                alert('网络错误，请稍后重试');
                console.error(err);
            });
    }

    function resetInterview() {
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('questionSection').style.display = 'block';
        currentRecordId = null;
    }

    function formatMarkdown(text) {
        let html = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/### (.*?)\n/g, '<h5>$1</h5>')
            .replace(/## (.*?)\n/g, '<h4>$1</h4>')
            .replace(/# (.*?)\n/g, '<h3>$1</h3>')
            .replace(/- (.*?)\n/g, '• $1<br>')
            .replace(/\n/g, '<br>');
        return html;
    }
</script>

</body>
</html>
