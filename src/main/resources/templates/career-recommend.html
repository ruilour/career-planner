<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>智能职业推荐</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .container { max-width: 800px; margin: 30px auto; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 16px 16px 0 0 !important; padding: 24px; }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
        .btn-gradient:hover { color: white; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .result-area { background: #f8f9fa; border-radius: 12px; padding: 20px; white-space: pre-wrap; line-height: 1.8; display: none; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e9ecef; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skill-tag { background: #e9ecef; padding: 4px 12px; border-radius: 20px; font-size: 13px; display: inline-block; margin: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">🤖 智能职业推荐</h3>
            <p class="mb-0 opacity-75">基于 AI 大模型，为你量身定制职业发展路径</p>
        </div>
        <div class="card-body">
            <form id="recommendForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">🎯 目标岗位</label>
                    <input type="text" id="jobTarget" class="form-control" placeholder="例如：Java后端开发、Vue前端工程师" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">🛠️ 当前技能</label>
                    <input type="text" id="currentSkills" class="form-control" placeholder="用逗号分隔，例如：Java, Spring Boot, MySQL">
                    <small class="text-muted">列出你已掌握的技术栈</small>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">📅 工作经验（年）</label>
                        <input type="number" id="experienceYears" class="form-control" value="0" min="0">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">🎓 学历</label>
                        <select id="education" class="form-select">
                            <option value="大专">大专</option>
                            <option value="本科" selected>本科</option>
                            <option value="硕士">硕士</option>
                            <option value="博士">博士</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn btn-gradient w-100 py-2" onclick="generateRecommend()">
                    🚀 生成职业推荐
                </button>
            </form>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p class="mt-3 text-muted">AI 正在分析中，请稍候（15-30秒）...</p>
            </div>

            <div id="resultArea" class="result-area mt-3"></div>

            <hr class="mt-4">
            <div class="d-flex gap-2">
                <a href="/career-recommend/history" class="btn btn-outline-secondary btn-sm">📋 历史记录</a>
                <a href="/videos" class="btn btn-outline-primary btn-sm">← 返回首页</a>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        alert('请先登录！');
        location.href = '/login';
    }

    function generateRecommend() {
        const jobTarget = document.getElementById('jobTarget').value.trim();
        const currentSkills = document.getElementById('currentSkills').value.trim();
        const experienceYears = document.getElementById('experienceYears').value;
        const education = document.getElementById('education').value;

        if (!jobTarget) {
            alert('请输入目标岗位！');
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        const formData = new URLSearchParams();
        formData.append('jobTarget', jobTarget);
        formData.append('currentSkills', currentSkills || '暂无');
        formData.append('experienceYears', experienceYears);
        formData.append('education', education);

        fetch('/career-recommend/api/generate', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (data.code === 200) {
                    const result = document.getElementById('resultArea');
                    result.innerHTML = formatMarkdown(data.data.recommendation);
                    result.style.display = 'block';
                } else {
                    alert('生成失败：' + data.message);
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert('网络错误，请稍后重试');
                console.error(err);
            });
    }

    function formatMarkdown(text) {
        let html = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/### (.*?)\n/g, '<h5>$1</h5>')
            .replace(/## (.*?)\n/g, '<h4>$1</h4>')
            .replace(/# (.*?)\n/g, '<h3>$1</h3>')
            .replace(/- (.*?)\n/g, '• $1<br>')
            .replace(/\n/g, '<br>');
        return html;
    }

    // Enter 键提交
    document.getElementById('jobTarget').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') generateRecommend();
    });
</script>

</body>
</html>
