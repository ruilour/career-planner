<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的投稿</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>📋 我的投稿记录</h3>
    <table class="table table-bordered mt-3">
        <thead><tr><th>标题</th><th>状态</th><th>驳回原因</th><th>时间</th></tr></thead>
        <tbody id="listBody"></tbody>
    </table>
    <a href="/videos">← 回首页</a>
</div>
<script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/videos';

    fetch('/api/my-submissions', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(res => res.json())
        .then(res => {
            if (res.code === 200) {
                const list = res.data;
                let html = '';
                list.forEach(v => {
                    const statusMap = { 'PENDING': '⏳待审核', 'APPROVED': '✅已通过', 'REJECTED': '❌已驳回' };
                    html += `<tr>
                    <td>${v.title}</td>
                    <td><strong>${statusMap[v.status] || v.status}</strong></td>
                    <td>${v.rejectReason || '-'}</td>
                    <td>${v.createTime}</td>
                </tr>`;
                });
                document.getElementById('listBody').innerHTML = html;
            }
        });
</script>
</body>
</html>
