<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>审核中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { padding: 15px; margin-bottom: 15px; border-left: 4px solid #ffc107; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; margin-right: 4px; }
        .tag-skill { background: #e3f2fd; color: #0d47a1; }
        .tag-job { background: #fce4ec; color: #c62828; }
        .btn { margin-right: 5px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h3>⚖️ 视频审核中心</h3>

    <!-- ✅ 使用 #lists.isEmpty 安全处理 null -->
    <div th:if="${#lists.isEmpty(pendingList)}" class="alert alert-success">🎉 暂无待审核视频，休息一下吧！</div>

    <!-- ✅ 只有非空时才循环 -->
    <div th:each="v : ${pendingList}" th:if="${not #lists.isEmpty(pendingList)}" class="card">
        <h5 th:text="${v.title}">标题</h5>
        <p><strong>作者：</strong><span th:text="${v.author}"></span>
            <span class="tag tag-skill" th:text="${v.skillTag}"></span>
            <span class="tag tag-job" th:text="${v.jobTag}"></span>
        </p>
        <p th:text="${v.description}"></p>
        <div>
            <button class="btn btn-success btn-sm approve-btn" th:data-id="${v.id}">通过</button>
            <button class="btn btn-danger btn-sm reject-btn" th:data-id="${v.id}">驳回</button>
        </div>
        <div th:id="'result_' + ${v.id}" class="mt-2"></div>
    </div>
    <a href="/videos" class="btn btn-outline-secondary mt-3">← 回首页</a>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录管理员账号！');
            window.location.href = '/login';
            return;
        }

        // 审核通过
        document.querySelectorAll('.approve-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                if (!id) return;
                if (!confirm('确定通过该视频吗？')) return;
                fetch('/admin/api/approve/' + id, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                    .then(r => r.json())
                    .then(d => {
                        alert(d.message);
                        if (d.code === 200) location.reload();
                    })
                    .catch(err => alert('请求失败：' + err.message));
            });
        });

        // 审核驳回
        document.querySelectorAll('.reject-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                if (!id) return;
                const reason = prompt('请输入驳回原因：');
                if (reason === null || reason.trim() === '') return;
                fetch('/admin/api/reject/' + id + '?reason=' + encodeURIComponent(reason), {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                })
                    .then(r => r.json())
                    .then(d => {
                        alert(d.message);
                        if (d.code === 200) location.reload();
                    })
                    .catch(err => alert('请求失败：' + err.message));
            });
        });
    });
</script>
</body>
</html>
