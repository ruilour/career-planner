<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户审核</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { padding: 15px; margin-bottom: 15px; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h3>用户审核中心</h3>
    <div th:if="${pendingList.isEmpty()}" class="alert alert-success">暂无待审批用户</div>

    <div th:each="u : ${pendingList}" class="card">
        <p><strong>用户名：</strong><span th:text="${u.username}"></span></p>
        <p><strong>邮箱：</strong><span th:text="${u.email}"></span></p>
        <p><strong>注册时间：</strong><span th:text="${u.createTime}"></span></p>
        <div>
            <button class="btn btn-success btn-sm approve-btn" th:data-id="${u.id}">通过</button>
            <button class="btn btn-danger btn-sm reject-btn" th:data-id="${u.id}">驳回</button>
        </div>
    </div>
    <a href="/videos" class="btn btn-outline-secondary mt-3">← 回首页</a>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        alert('请先登录管理员账号！');
        location.href = '/login';
    }

    document.querySelectorAll('.approve-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            if (!confirm('确定通过该用户的注册申请吗？')) return;
            fetch('/admin/users/api/approve/' + id, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(r => r.json())
                .then(d => {
                    alert(d.message);
                    if (d.code === 200) location.reload();
                });
        });
    });

    document.querySelectorAll('.reject-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            if (!confirm('确定驳回该用户的注册申请吗？')) return;
            fetch('/admin/users/api/reject/' + id, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(r => r.json())
                .then(d => {
                    alert(d.message);
                    if (d.code === 200) location.reload();
                });
        });
    });
</script>
</body>
</html>
